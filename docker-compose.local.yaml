services:

  postgres:
    image: postgres:16
    container_name: postgres-orm
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
      POSTGRES_DB: postegres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: always
    networks:
      - orm-network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@gmail.com
      PGADMIN_DEFAULT_PASSWORD: mypassword
    ports:
      - "8080:80"
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    depends_on:
      - postgres
    networks:
      - orm-network

  backend:
    build:
      context: ./orm
      dockerfile: Dockerfile.local
    ports:
      - "8000:8000"
    volumes:
      - ./orm:/app
    env_file:
      - ./orm/.env.local
    depends_on:
      - postgres
    networks:
      - orm-network

  redis:
    image: redis:latest
    container_name: redis-orm
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --save 20 1 
    networks:
      - orm-network

volumes:
  postgres_data:
  redis_data:
  pgadmin-data:

networks:
  orm-network: